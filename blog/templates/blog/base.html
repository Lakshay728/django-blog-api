<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Blog{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #2c3e50; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; font-weight: 600; font-size: 1.1rem; }
        nav .nav-links a { margin-left: 20px; font-size: 0.9rem; font-weight: 400; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .btn { background: #2c3e50; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .btn:hover { background: #34495e; }
        .btn-danger { background: #e74c3c; }
        .message { padding: 12px; border-radius: 6px; margin-bottom: 20px; }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <nav>
        <a href="/">My Blog</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/create/">New Post</a>
            <a href="/login/" id="auth-link">Login</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        const token = localStorage.getItem('access_token');
        if (token) {
            document.getElementById('auth-link').textContent = 'Logout';
            document.getElementById('auth-link').href = '/logout/';
        }
    </script>
</body>
</html>
